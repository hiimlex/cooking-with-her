services:
  - type: web
    name: cooking-with-her-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npx tsx src/index.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Prisma Postgres URL — set in Render dashboard
      - key: DIRECT_URL
        sync: false # Prisma Postgres direct URL — set in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: PORT
        value: "3333"
      - key: HOST
        value: "0.0.0.0"
