services:

  # ── Database: PostgreSQL ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       cwh
      POSTGRES_USER:     cwh
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cwh_local_secret}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test:         ["CMD", "pg_isready", "-U", "cwh", "-d", "cwh"]
      interval:     5s
      timeout:      5s
      retries:      10
      start_period: 10s

  # ── Backend: Fastify + Prisma ────────────────────────────────────────────────
  api:
    build:
      context:    .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV:     production
      DATABASE_URL: postgresql://cwh:${DB_PASSWORD:-cwh_local_secret}@db:5432/cwh
      DIRECT_URL:   postgresql://cwh:${DB_PASSWORD:-cwh_local_secret}@db:5432/cwh
      JWT_SECRET:   ${JWT_SECRET:-cooking-with-her-change-me-in-prod}
      CORS_ORIGIN:  http://localhost:${APP_PORT:-80}
      PORT:         "3333"
      HOST:         "0.0.0.0"
      SEED_DB:      ${SEED_DB:-false}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:         ["CMD", "wget", "-qO-", "http://localhost:3333/health"]
      interval:     15s
      timeout:      5s
      retries:      5
      start_period: 20s

  # ── Frontend: Vite build served by nginx ────────────────────────────────────
  app:
    build:
      context:    .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  db-data:
