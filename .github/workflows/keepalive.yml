name: Keep server alive

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "${{ secrets.VITE_API_URL }}/health" || echo "000")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: server returned $STATUS — retrying in 30s..."
            sleep 30
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "${{ secrets.VITE_API_URL }}/health" || echo "000")
            echo "Retry status: $STATUS"
          fi
