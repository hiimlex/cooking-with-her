name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to push to gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # /<repo-name>/ — GitHub Pages serves under this path.
          # Override with a repo variable (Settings → Variables → Actions)
          # if you use a custom domain and want base = '/'.
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || format('/{0}/', github.event.repository.name) }}
          # Full URL of your Vercel API deployment.
          # Set as a repo secret: Settings → Secrets → Actions → VITE_API_URL
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      # Copy 404.html so GH Pages serves the SPA shell on unknown paths
      - name: Add 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./dist
          cname:        ${{ vars.PAGES_CNAME }}   # optional: your custom domain
