server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        image/svg+xml;

    # Cache busted assets (Vite adds hash to filenames)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # PWA files — short cache so updates land quickly
    location ~* \.(webmanifest|sw\.js)$ {
        add_header Cache-Control "no-cache";
    }

    # API proxy — forward all backend routes to the api container
    location ~ ^/(auth|recipes|pantry|shopping|stats|ai|utensils|memories|history|health) {
        proxy_pass         http://api:3333;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
